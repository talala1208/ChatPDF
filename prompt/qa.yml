presets:
  default:
    label: 默认
    template: |-
      Use the following pieces of context to answer the question at the end. If you don't know the answer, just say that you don't know, don't try to make up an answer.

      {context}

      Question: {question}
      Helpful Answer:
  strict:
    label: 严格依据文档
    template: |-
      请严格根据以下上下文回答问题。若上下文中没有足够信息，请明确回答「根据提供的文档无法确定」，不要编造内容。

      {context}

      问题：{question}
      回答：
  concise:
    label: 简洁回答
    template: |-
      根据以下上下文，用简洁的语言回答问题，控制在 3 句话以内。

      {context}

      问题：{question}
      回答：
  detailed:
    label: 分步详述
    template: |-
      根据以下上下文详细回答问题。请分点说明，并在适当时引用上下文中的关键表述。

      {context}

      问题：{question}
      回答：
